<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>AKZERN Marka — Dinamik</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&display=swap" rel="stylesheet">
<style>
  :root{--accent:#F7911E;--accent-deep:#E07B12;--ink:#2A2620;--ink-soft:#6B6357;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#111;display:flex;justify-content:center;font-family:'Sora',sans-serif;}
  .post{width:1080px;height:1350px;position:relative;overflow:hidden;background:#EFE7D8;-webkit-font-smoothing:antialiased;}
  .bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center bottom;}
  .veilTop{position:absolute;top:0;left:0;right:0;height:600px;background:linear-gradient(180deg,rgba(244,238,228,.92) 0%,rgba(244,238,228,.35) 62%,transparent 100%);}
  .topbar{position:absolute;top:52px;left:60px;right:56px;display:flex;justify-content:space-between;align-items:center;z-index:5;}
  .logo{height:60px;}
  .handle{color:var(--ink-soft);font-weight:600;font-size:21px;}
  .head{position:absolute;top:150px;left:70px;right:70px;text-align:center;z-index:4;}
  .head .kk{font-size:24px;font-weight:600;letter-spacing:.3em;text-transform:uppercase;color:var(--accent-deep);}
  .head h2{font-family:'Fraunces',serif;font-weight:600;font-size:92px;line-height:.98;color:var(--ink);margin-top:14px;letter-spacing:-.02em;}
  .head .slogan{margin-top:20px;font-size:26px;color:var(--ink-soft);font-weight:500;line-height:1.4;}
  .foot{position:absolute;bottom:60px;left:0;right:0;display:flex;justify-content:center;z-index:5;}
  .cta{display:inline-flex;align-items:center;gap:14px;background:var(--ink);color:#fff;font-weight:700;font-size:25px;padding:19px 36px;border-radius:999px;box-shadow:0 14px 30px rgba(43,43,43,.28);}
  .cta .ar{width:30px;height:30px;border-radius:50%;background:var(--accent);color:#fff;display:grid;place-items:center;font-size:17px;}
</style>
</head>
<body>
  <div class="post">
    <img class="bg" src="assets/kapak-hero.png" alt="">
    <div class="veilTop"></div>
    <div class="topbar"><img class="logo" src="assets/akzern-logo.png"><span class="handle" id="handle">@akzernyapi</span></div>
    <div class="head">
      <div class="kk" id="kicker">AKZERN YAPI</div>
      <h2 id="baslik">Yapının<br>Sağlam İsmi</h2>
      <div class="slogan" id="slogan">Kapı & mobilya aksesuarında<br>premium seçim, uzman güven.</div>
    </div>
    <div class="foot"><div class="cta">Koleksiyonu Keşfet <span class="ar">›</span></div></div>
  </div>
<script>
  const p=new URLSearchParams(location.search),S=(i,v)=>{if(v!=null){const e=document.getElementById(i);if(e)e.textContent=v}};
  if(p.get('bg'))document.querySelector('.bg').src=p.get('bg');
  if(p.get('baslik'))document.getElementById('baslik').innerHTML=p.get('baslik').replace(/\|/g,'<br>');
  if(p.get('slogan'))document.getElementById('slogan').innerHTML=p.get('slogan').replace(/\|/g,'<br>');
  S('kicker',p.get('kicker'));S('handle',p.get('handle'));
</script>
</body>
</html>
