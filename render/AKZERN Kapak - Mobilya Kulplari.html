<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>AKZERN Mobilya Kulpları Kapak</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,600;9..144,700;9..144,900&display=swap" rel="stylesheet">
<style>
  :root{--accent:#F7911E;--accent-deep:#E07B12;--ink:#2A2620;--ink-soft:#6B6357;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#111;display:flex;justify-content:center;font-family:'Sora',sans-serif;}
  .post{width:1080px;height:1350px;position:relative;overflow:hidden;background:#EFE7D8;-webkit-font-smoothing:antialiased;}
  .hero{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center bottom;}
  .veil{position:absolute;top:0;left:0;right:0;height:520px;background:linear-gradient(180deg,rgba(244,238,228,.82) 0%,rgba(244,238,228,.4) 55%,transparent 100%);}
  .swipe{position:absolute;top:52px;right:54px;display:flex;align-items:center;gap:8px;background:rgba(42,38,32,.82);color:#fff;font-weight:600;font-size:20px;padding:10px 18px;border-radius:999px;z-index:5;}
  .head{position:absolute;top:104px;left:64px;right:64px;text-align:center;z-index:4;}
  .head .kk{font-size:26px;font-weight:600;letter-spacing:.05em;color:var(--accent-deep);}
  .head h2{font-family:'Fraunces',serif;font-weight:600;font-size:88px;line-height:.98;color:var(--ink);margin-top:12px;letter-spacing:-.015em;}
  .head .cta{display:inline-flex;align-items:center;gap:14px;margin-top:26px;background:var(--accent);color:#fff;font-weight:700;font-size:27px;padding:20px 38px;border-radius:999px;box-shadow:0 16px 34px rgba(247,145,30,.4);}
  .head .cta .ar{width:32px;height:32px;border-radius:50%;background:#fff;color:var(--accent);display:grid;place-items:center;font-size:19px;}
  .rosette{position:absolute;top:158px;right:40px;width:170px;height:170px;border-radius:50%;transform:rotate(-8deg);z-index:6;
    background:radial-gradient(circle at 42% 38%,#F9A63F,#E07B12);color:#fff;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    box-shadow:0 18px 34px rgba(224,123,18,.45);border:3px solid rgba(255,255,255,.35);}
  .rosette .l1{font-family:'Fraunces',serif;font-weight:700;font-size:42px;line-height:.9;}
  .rosette .l2{font-weight:700;font-size:22px;letter-spacing:.16em;margin-top:4px;}
  .logo{position:absolute;bottom:54px;left:60px;height:70px;z-index:6;}
  .fine{position:absolute;bottom:60px;right:58px;text-align:right;font-size:19px;color:var(--ink-soft);line-height:1.4;z-index:6;}
  .fine b{color:var(--ink);}
</style>
</head>
<body>
  <div class="post">
    <img class="hero" id="hero" src="assets/kapak-hero.png" alt="mobilya kulpları">
    <div class="veil"></div>
    <div class="swipe" id="sira">1 / 6 ›</div>
    <div class="head">
      <div class="kk" id="kk">AKZERN YAPI · Mobilya Kulpları</div>
      <h2 id="baslik">Mobilyanıza<br>İmza Atın</h2>
      <div class="cta">Hemen Keşfet <span class="ar">›</span></div>
    </div>
    <div class="rosette"><span class="l1" id="rl1">Yeni</span><span class="l2" id="rl2">SEZON</span></div>
    <img class="logo" src="assets/akzern-logo.png" alt="AKZERN YAPI">
    <div class="fine" id="fine"><b>Bar · Cup · Düğme</b><br>Krom · Siyah · Altın</div>
  </div>
<script>
  const p=new URLSearchParams(location.search),S=(i,v)=>{if(v!=null){const e=document.getElementById(i);if(e)e.textContent=v}};
  if(p.get('hero'))document.getElementById('hero').src=p.get('hero');
  if(p.get('baslik'))document.getElementById('baslik').innerHTML=p.get('baslik').replace(/\|/g,'<br>');
  if(p.get('fine'))document.getElementById('fine').innerHTML=p.get('fine').replace(/\|/g,'<br>');
  S('kk',p.get('kk'));S('sira',p.get('sira'));S('rl1',p.get('rl1'));S('rl2',p.get('rl2'));
</script>
</body>
</html>
