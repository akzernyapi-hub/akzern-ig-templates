name: render-carousel
on:
  push:
    paths: ['render/job.json']
  workflow_dispatch:
permissions:
  contents: write
jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Kur (Pillow + chromium)
        run: |
          pip install --quiet Pillow playwright
          python -m playwright install --with-deps chromium
      - name: İndir + products.json + render
        run: |
          cd render
          python3 - <<'PY'
          import json, os, urllib.request
          job = json.load(open('job.json'))
          os.makedirs('assets/hero', exist_ok=True)
          for h in job['heroes']:
              urllib.request.urlretrieve(h['url'], f"assets/hero/{h['slug']}.png")
              print('hero:', h['slug'], os.path.getsize(f"assets/hero/{h['slug']}.png'"[:-1]) if False else os.path.getsize(f"assets/hero/{h['slug']}.png"))
          urllib.request.urlretrieve(job['kapak_url'], 'assets/kapak-hero.png')
          print('kapak:', os.path.getsize('assets/kapak-hero.png'))
          json.dump(job['products'], open('products.json','w'), ensure_ascii=False, indent=1)
          PY
          export CHROME_BIN=$(python3 -c "from playwright.sync_api import sync_playwright; p=sync_playwright().start(); print(p.chromium.executable_path)")
          echo "CHROME=$CHROME_BIN"
          (python3 -m http.server 8791 >/dev/null 2>&1 &) ; sleep 2
          "$CHROME_BIN" --headless=new --no-sandbox --disable-gpu --hide-scrollbars --force-device-scale-factor=2 --window-size=1080,1350 --screenshot=kapak-kapikollari.png 'http://localhost:8791/AKZERN%20Kapak%20-%20Kapi%20Kollari.html'
          python3 uret-carousel.py products.json ../out kapak-kapikollari.png
          echo "=== out ==="; ls -la ../out
      - name: Sonuçları repoya commit et
        run: |
          git config user.name akzern-bot
          git config user.email bot@akzern.local
          git add out/ && git commit -m "carousel render [skip ci]" && git push || echo "commit yok"
