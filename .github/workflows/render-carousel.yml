name: render-carousel
on:
  push:
    paths: ['render/job.json']
  workflow_dispatch:
permissions:
  contents: write
jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Kur (Pillow + chromium)
        run: |
          pip install --quiet Pillow playwright
          python -m playwright install --with-deps chromium
      - name: NANO BANANA PRO sahne + yazi (uret.py)
        env:
          FAL_KEY: ${{ secrets.FAL_KEY }}
        run: |
          cd render
          export CHROME_BIN=$(python3 -c "from playwright.sync_api import sync_playwright; p=sync_playwright().start(); print(p.chromium.executable_path)")
          (python3 -m http.server 8791 >/dev/null 2>&1 &) ; sleep 2
          python3 uret.py
          KLASOR=$(python3 -c "import json;print(json.load(open('job.json'))['klasor'])")
          echo "=== $KLASOR ==="; ls -la "../arsiv/$KLASOR"
      - name: Commit
        run: |
          git config user.name akzern-bot; git config user.email bot@akzern.local
          git add arsiv/ && git commit -m "render NBPRO [skip ci]" && git push || echo "yok"
      - name: Drive'a yukle (rclone)
        if: always()
        env:
          RCLONE_CONF: ${{ secrets.RCLONE_CONF }}
        run: |
          [ -z "$RCLONE_CONF" ] && exit 0
          mkdir -p ~/.config/rclone && printf '%s' "$RCLONE_CONF" > ~/.config/rclone/rclone.conf
          curl -fsSL -o /tmp/rc.zip https://downloads.rclone.org/rclone-current-linux-amd64.zip
          cd /tmp && unzip -oq rc.zip && RC=$(echo /tmp/rclone-*-linux-amd64/rclone)
          KLASOR=$(python3 -c "import json;print(json.load(open('$GITHUB_WORKSPACE/render/job.json'))['klasor'])")
          "$RC" copy "$GITHUB_WORKSPACE/arsiv/$KLASOR" "drive:AKZERN Instagram/$KLASOR" --transfers 4 2>&1 | tail -3 || echo "drive hata"
