name: render-carousel
on:
  push:
    paths: ['render/job.json']
  workflow_dispatch:
permissions:
  contents: write
jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Kur (Pillow + chromium)
        run: |
          pip install --quiet Pillow playwright
          python -m playwright install --with-deps chromium
      - name: İndir kesimler + kompoze + render (tip'e göre)
        run: |
          cd render
          python3 - <<'PY'
          import json, os, urllib.request
          job = json.load(open('job.json'))
          os.makedirs('assets/cut', exist_ok=True)
          prods = job['products']
          for p in prods:
              urllib.request.urlretrieve(p['cutout_url'], f"assets/cut/{p['slug']}.png")
              print('kesim', p['slug'], os.path.getsize(f"assets/cut/{p['slug']}.png"))
          pj = [{"ad":p["ad"],"finish":p["finish"],"price":p["price"],
                 "compareAtPrice":p.get("compareAtPrice"),"slug":p["slug"],
                 "kategori":p.get("kategori", job.get("kategori","AKZERN YAPI")),
                 "hero":f"assets/ic/{p['slug']}.png"} for p in prods]
          json.dump(pj, open('products.json','w'), ensure_ascii=False, indent=1)
          json.dump([p['slug'] for p in prods], open('_slugs.json','w'))
          open('_tip.txt','w').write(job.get('tip','carousel'))
          open('_klasor.txt','w').write(job['klasor'])
          PY
          python3 kompoze.py "$(cat _slugs.json)"
          export CHROME_BIN=$(python3 -c "from playwright.sync_api import sync_playwright; p=sync_playwright().start(); print(p.chromium.executable_path)")
          (python3 -m http.server 8791 >/dev/null 2>&1 &) ; sleep 2
          TIP=$(cat _tip.txt); KLASOR=$(cat _klasor.txt)
          mkdir -p "../arsiv/$KLASOR"
          if [ "$TIP" = "tekil" ]; then
            python3 uret-tekil.py products.json "../arsiv/$KLASOR"
          else
            "$CHROME_BIN" --headless=new --no-sandbox --disable-gpu --hide-scrollbars --force-device-scale-factor=2 --window-size=1080,1350 --screenshot=kapak.png 'http://localhost:8791/AKZERN%20Kapak%20-%20Kapi%20Kollari.html'
            python3 uret-carousel.py products.json ../out kapak.png
            cp ../out/*.png "../arsiv/$KLASOR/"
          fi
          echo "=== $TIP / arşiv: $KLASOR ==="; ls -la "../arsiv/$KLASOR"
      - name: Commit (arşiv + out)
        run: |
          git config user.name akzern-bot
          git config user.email bot@akzern.local
          git add arsiv/ out/ && git commit -m "render (tip) + arşiv [skip ci]" && git push || echo "değişiklik yok"
      - name: Google Drive'a yükle (rclone, sınırlı yetki)
        if: always()
        env:
          RCLONE_CONF: ${{ secrets.RCLONE_CONF }}
        run: |
          if [ -z "$RCLONE_CONF" ]; then echo "RCLONE_CONF yok — Drive atlandı"; exit 0; fi
          mkdir -p ~/.config/rclone && printf '%s' "$RCLONE_CONF" > ~/.config/rclone/rclone.conf
          curl -fsSL -o /tmp/rc.zip https://downloads.rclone.org/rclone-current-linux-amd64.zip
          cd /tmp && unzip -oq rc.zip && RC=$(echo /tmp/rclone-*-linux-amd64/rclone)
          KLASOR=$(cat "$GITHUB_WORKSPACE/render/_klasor.txt")
          "$RC" copy "$GITHUB_WORKSPACE/arsiv/$KLASOR" "drive:AKZERN Instagram/$KLASOR" --transfers 4 -v 2>&1 | tail -8 || echo "Drive yükleme hatası"
          echo "✓ Drive: AKZERN Instagram/$KLASOR"
