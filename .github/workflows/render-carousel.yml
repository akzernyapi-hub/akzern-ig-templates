name: render-carousel
on:
  push:
    paths: ['render/job.json']
  workflow_dispatch:
permissions:
  contents: write
jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Kur (Pillow + chromium)
        run: |
          pip install --quiet Pillow playwright
          python -m playwright install --with-deps chromium
      - name: İndir + kompoze + render + QA karşılaştırma
        run: |
          cd render
          python3 - <<'PY'
          import json, os, urllib.request
          job = json.load(open('job.json'))
          os.makedirs('assets/cut', exist_ok=True)
          prods = job['products']
          for p in prods:
              urllib.request.urlretrieve(p['cutout_url'], f"assets/cut/{p['slug']}.png")
          pj = [{"ad":p["ad"],"finish":p["finish"],"price":p["price"],"compareAtPrice":p.get("compareAtPrice"),
                 "slug":p["slug"],"kategori":p.get("kategori", job.get("kategori","AKZERN YAPI")),
                 "hero":f"assets/ic/{p['slug']}.png"} for p in prods]
          json.dump(pj, open('products.json','w'), ensure_ascii=False, indent=1)
          json.dump([p['slug'] for p in prods], open('_slugs.json','w'))
          open('_tip.txt','w').write(job.get('tip','carousel')); open('_klasor.txt','w').write(job['klasor'])
          PY
          python3 kompoze.py "$(cat _slugs.json)"
          export CHROME_BIN=$(python3 -c "from playwright.sync_api import sync_playwright; p=sync_playwright().start(); print(p.chromium.executable_path)")
          (python3 -m http.server 8791 >/dev/null 2>&1 &) ; sleep 2
          TIP=$(cat _tip.txt); KLASOR=$(cat _klasor.txt); mkdir -p "../arsiv/$KLASOR"
          if [ "$TIP" = "tekil" ]; then python3 uret-tekil.py products.json "../arsiv/$KLASOR"
          elif [ "$TIP" = "lifestyle" ]; then python3 kompoze.py "$(cat _slugs.json)" lifestyle; python3 uret-lifestyle.py products.json "../arsiv/$KLASOR"
          else
            "$CHROME_BIN" --headless=new --no-sandbox --disable-gpu --hide-scrollbars --force-device-scale-factor=2 --window-size=1080,1350 --screenshot=kapak.png 'http://localhost:8791/AKZERN%20Kapak%20-%20Kapi%20Kollari.html'
            python3 uret-carousel.py products.json ../out kapak.png; cp ../out/*.png "../arsiv/$KLASOR/"
          fi
          # QA karşılaştırma: gerçek Shopify görseli | AI kesim (form denetimi için)
          python3 - <<'PY'
          import json, os, urllib.request
          from PIL import Image
          job=json.load(open('job.json')); klasor=job['klasor']
          qa=f"../arsiv/{klasor}/_qa"; os.makedirs(qa, exist_ok=True); H=520
          for p in job['products']:
              g=p.get('gercek_url')
              if not g: continue
              try:
                  urllib.request.urlretrieve(g,'/tmp/real'); real=Image.open('/tmp/real').convert('RGB')
                  cut=Image.open(f"assets/cut/{p['slug']}.png").convert('RGBA')
                  cb=Image.new('RGB',cut.size,(255,255,255)); cb.paste(cut,(0,0),cut)
                  ra=real.resize((int(real.width*H/real.height),H)); ca=cb.resize((int(cb.width*H/cb.height),H))
                  comp=Image.new('RGB',(ra.width+ca.width+30,H+50),(235,235,235))
                  comp.paste(ra,(10,30)); comp.paste(ca,(ra.width+20,30)); comp.save(f"{qa}/{p['slug']}.png")
                  print('qa', p['slug'])
              except Exception as e: print('qa hata', p['slug'], e)
          PY
          echo "=== $TIP / $KLASOR ==="; ls -la "../arsiv/$KLASOR"
      - name: Commit
        run: |
          git config user.name akzern-bot; git config user.email bot@akzern.local
          git add arsiv/ out/ && git commit -m "render + QA [skip ci]" && git push || echo "yok"
      - name: Drive'a yükle (rclone)
        if: always()
        env:
          RCLONE_CONF: ${{ secrets.RCLONE_CONF }}
        run: |
          [ -z "$RCLONE_CONF" ] && { echo "RCLONE_CONF yok"; exit 0; }
          mkdir -p ~/.config/rclone && printf '%s' "$RCLONE_CONF" > ~/.config/rclone/rclone.conf
          curl -fsSL -o /tmp/rc.zip https://downloads.rclone.org/rclone-current-linux-amd64.zip
          cd /tmp && unzip -oq rc.zip && RC=$(echo /tmp/rclone-*-linux-amd64/rclone)
          KLASOR=$(cat "$GITHUB_WORKSPACE/render/_klasor.txt")
          "$RC" copy "$GITHUB_WORKSPACE/arsiv/$KLASOR" "drive:AKZERN Instagram/$KLASOR" --transfers 4 2>&1 | tail -4 || echo "drive hata"
          echo "✓ Drive: $KLASOR"
